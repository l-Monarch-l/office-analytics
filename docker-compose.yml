version: '3.8'
services:
  db:
    image: postgres:15
    container_name: office_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: office_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: office_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: office_analytics
      FLASK_APP: web.app
    volumes:
      - ./data:/app/data
      - .:/app
    command: flask run --host=0.0.0.0 --port=5000
    ports:
      - "5000:5000"

volumes:
  postgres_data: